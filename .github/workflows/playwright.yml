# .github/workflows/playwright.yml

name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Step 5: Run Playwright tests
      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}
          HEADLESS: 'true'

      # Step 6: Upload HTML report (even if tests fail)
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()                      # ✅ uploads even on failure
        with:
          name: playwright-html-report
          path: reports/html-report/
          retention-days: 30

      # Step 7: Upload test artifacts (screenshots, videos, traces)
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()                     # ✅ only uploads on failure
        with:
          name: test-artifacts
          path: reports/test-artifacts/
          retention-days: 7